name: Dev CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  frontend-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format

      - name: Test
        run: npm run test

  backend-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

  e2e-tests:
    needs: [frontend-validate, backend-validate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20 # DOWNGRADED TO 20 FOR AZURE FUNCTIONS SUPPORT
          cache: "npm"
          cache-dependency-path: ./package-lock.json

      - name: Install Azure Functions Core Tools & SWA CLI
        run: |
          npm i -g azure-functions-core-tools@4 --unsafe-perm true
          npm i -g @azure/static-web-apps-cli

      - name: Generate Backend local.settings.json
        run: |
          cat << 'EOF' > ./backend/local.settings.json
          {
            "IsEncrypted": false,
            "Values": {
              "FUNCTIONS_WORKER_RUNTIME": "node",
              "AzureWebJobsStorage": "UseDevelopmentStorage=true",
              "DB_SERVER": "${{secrets.DB_SERVER}}", 
              "DB_USER": "${{secrets.DB_USER}}",
              "DB_PASSWORD": "${{secrets.DB_PASSWORD}}",
              "DB_NAME": "${{secrets.DB_NAME}}",
              "SOCCER_ODDS_API": "${{secrets.SOCCER_ODDS_API}}"
            }
          }
          EOF
      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e:full

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
